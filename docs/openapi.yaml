openapi: 3.0.3
info:
  title: 공공데이터 공모전 API
  version: 1.0.0
  description: 여행 코스 추천 서비스 API 명세 (xlsx 자동 변환)
servers:
- url: /
  description: 기본 서버
tags:
- name: auth
  description: 인증
- name: user
  description: 회원
- name: tour-course
  description: 여행 코스
- name: poi
  description: POI
paths:
  /api/v1/auth/login:
    post:
      tags:
      - auth
      summary: 로그인
      description: 이메일·비밀번호 검증 후 AccessToken(body) + RefreshToken(HttpOnly Cookie) 발급
      operationId: GBC001
      x-status: 완료
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  description: 사용자 이메일 (이메일 형식)
                password:
                  type: string
                  description: 사용자 비밀번호
              required:
              - email
              - password
            example:
              email: hong@example.com
              password: password123
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /api/v1/auth/logout:
    post:
      tags:
      - auth
      summary: 로그아웃
      description: RefreshToken 삭제 및 쿠키 만료 처리
      operationId: GBC002
      x-status: 완료
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /api/v1/auth/reissue:
    post:
      tags:
      - auth
      summary: 토큰 재발급
      description: RefreshToken으로 AccessToken 재발급 (RefreshToken 로테이션)
      operationId: GBC003
      x-status: 완료
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /api/v1/auth/oauth/kakao/callback:
    post:
      tags:
      - auth
      summary: 카카오 OAuth 콜백
      description: FE 발급 카카오 AccessToken 검증 후 자체 JWT 발급
      operationId: GBC004
      x-status: 완료
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                kakaoAccessToken:
                  type: string
                  description: 카카오 SDK로 발급받은 AccessToken
              required:
              - kakaoAccessToken
            example:
              kakaoAccessToken: eyJhbGciOiJIUzI1NiJ9...
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /api/v1/user/join:
    post:
      tags:
      - user
      summary: 회원가입
      description: 이메일·비밀번호·닉네임으로 신규 회원 생성
      operationId: GBC005
      x-status: 완료
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  description: 사용자 이메일 (이메일 형식)
                nickname:
                  type: string
                  description: 사용자 닉네임 (2자 이상 100자 이하)
                password:
                  type: string
                  description: 사용자 비밀번호 (8자 이상 255자 이하)
              required:
              - email
              - nickname
              - password
            example:
              email: hong@example.com
              nickname: 홍길동
              password: password123
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              example:
                code: '200'
                msg: 회원가입에 성공했습니다.
                data:
                  id: 1
                  email: hong@example.com
                  nickname: 홍길동
  /api/v1/user/{userId}:
    get:
      tags:
      - user
      summary: 회원 정보 조회
      description: 로그인 사용자 본인 정보 조회
      operationId: GBC006
      x-status: 완료
      parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: string
      security:
      - bearerAuth: []
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              example:
                code: '200'
                msg: 회원 정보를 조회했습니다.
                data:
                  id: 1
                  email: hong@example.com
                  nickname: 홍길동
                  address: null
                  birthDate: null
                  gender: null
                  travelType: null
    delete:
      tags:
      - user
      summary: 회원 탈퇴
      description: 소프트 삭제 (deletedAt 설정)
      operationId: GBC009
      x-status: 완료
      parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: string
      security:
      - bearerAuth: []
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              example:
                code: '200'
                msg: 회원 탈퇴가 완료되었습니다.
                data: null
  /api/v1/user/{userId}/nickname:
    patch:
      tags:
      - user
      summary: 닉네임 수정
      description: 로그인 사용자 닉네임 변경
      operationId: GBC007
      x-status: 완료
      parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: string
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nickname:
                  type: string
                  description: 변경할 닉네임 (2자 이상 100자 이하)
              required:
              - nickname
            example:
              nickname: 새닉네임
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              example:
                code: '200'
                msg: 닉네임이 수정되었습니다.
                data: null
  /api/v1/user/{userId}/password:
    patch:
      tags:
      - user
      summary: 비밀번호 변경
      description: 현재 비밀번호 검증 후 새 비밀번호로 변경
      operationId: GBC008
      x-status: 완료
      parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: string
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                currentPassword:
                  type: string
                  description: 현재 비밀번호
                newPassword:
                  type: string
                  description: 새 비밀번호 (8자 이상 255자 이하)
              required:
              - currentPassword
              - newPassword
            example:
              currentPassword: oldPassword123
              newPassword: newPassword456
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              example:
                code: '200'
                msg: 비밀번호가 변경되었습니다.
                data: null
  /api/v1/tour-course:
    post:
      tags:
      - tour-course
      summary: AI 코스 생성
      description: '인원·기간·이동수단·테마·시군구 입력으로 AI 여행 코스 생성 (비로그인 허용)

        (인증 선택: 비로그인 허용)'
      operationId: GBC010
      x-status: 완료
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                peopleCount:
                  type: integer
                  description: 여행 인원수
                startDate:
                  type: string
                  format: date
                  description: 여행 시작 날짜 (오늘 이후, yyyy-MM-dd)
                endDate:
                  type: string
                  format: date
                  description: 여행 종료 날짜 (시작 날짜 이후, yyyy-MM-dd)
                transport:
                  type: string
                  description: 이동수단 (CAR / PUBLIC_TRANSPORT / WALK)
                theme:
                  type: array
                  items:
                    type: string
                  description: 테마 목록 (최소 1개 이상)
                sigunguCode:
                  type: string
                  description: 시군구 코드
              required:
              - peopleCount
              - startDate
              - endDate
              - transport
              - theme
            example:
              peopleCount: 2
              startDate: '2026-07-01'
              endDate: '2026-07-03'
              transport: CAR
              theme:
              - 자연
              - 맛집
              sigunguCode: '35130'
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              example:
                code: '200'
                msg: 여행 코스가 생성되었습니다.
                data:
                  courseId: 1
                  schedule:
                  - date: '2026-07-01'
                    places:
                    - seq: 1
                      time: '10:00:00'
                      type: ATTRACTION
                      contentId: 123456
    get:
      tags:
      - tour-course
      summary: 내 코스 목록 조회
      description: 로그인 사용자의 저장 코스 목록 반환
      operationId: GBC011
      x-status: 완료
      security:
      - bearerAuth: []
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              example:
                code: '200'
                msg: 코스 목록을 조회했습니다.
                data:
                - courseId: 1
                  title: 경주 2박 3일 여행
                  peopleCount: 2
                  startDate: '2026-07-01'
                  endDate: '2026-07-03'
                  transport: CAR
                  theme:
                  - 자연
                  - 맛집
                  createdAt: '2026-06-27T10:00:00'
  /api/v1/tour-course/{courseId}:
    get:
      tags:
      - tour-course
      summary: 코스 상세 조회
      description: 소유자 인증 후 코스 헤더 + 일정 상세 반환
      operationId: GBC012
      x-status: 완료
      parameters:
      - name: courseId
        in: path
        required: true
        schema:
          type: string
      security:
      - bearerAuth: []
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              example:
                code: '200'
                msg: 코스 상세를 조회했습니다.
                data:
                  courseId: 1
                  title: 경주 2박 3일 여행
                  peopleCount: 2
                  startDate: '2026-07-01'
                  endDate: '2026-07-03'
                  transport: CAR
                  theme:
                  - 자연
                  - 맛집
                  schedule:
                  - date: '2026-07-01'
                    places:
                    - seq: 1
                      time: '10:00:00'
                      type: ATTRACTION
                      contentId: 123456
                      placeName: 불국사
    delete:
      tags:
      - tour-course
      summary: 코스 삭제
      description: 소유자 인증 후 코스 삭제
      operationId: GBC013
      x-status: 완료
      parameters:
      - name: courseId
        in: path
        required: true
        schema:
          type: string
      security:
      - bearerAuth: []
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              example:
                code: '200'
                msg: 코스가 삭제되었습니다.
                data: null
    patch:
      tags:
      - poi
      summary: 코스 수정
      description: 사용자가 수정한 코스 상세 내역 변경
      operationId: GBC020
      x-status: 개발 중
      parameters:
      - name: courseId
        in: path
        required: true
        schema:
          type: string
      security:
      - bearerAuth: []
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /api/v1/tour-course/{courseId}/view:
    get:
      tags:
      - tour-course
      summary: 공개 코스 뷰
      description: 인증 없이 코스 조회 (카카오 공유 수신자용)
      operationId: GBC014
      x-status: 완료
      parameters:
      - name: courseId
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              example:
                code: '200'
                msg: 코스 조회에 성공했습니다.
                data:
                  courseId: 1
                  title: 경주 2박 3일 여행
                  peopleCount: 2
                  startDate: '2026-07-01'
                  endDate: '2026-07-03'
                  transport: CAR
                  theme:
                  - 자연
                  - 맛집
                  schedule:
                  - date: '2026-07-01'
                    places:
                    - seq: 1
                      time: '10:00:00'
                      type: ATTRACTION
                      contentId: 123456
                      placeName: 불국사
  /api/v1/tour-course/{courseId}/title:
    patch:
      tags:
      - tour-course
      summary: 코스 제목 수정
      description: 소유자 인증 후 코스 제목 변경
      operationId: GBC015
      x-status: 완료
      parameters:
      - name: courseId
        in: path
        required: true
        schema:
          type: string
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  description: 변경할 코스 제목 (255자 이하)
              required:
              - title
            example:
              title: 경주 힐링 여행
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              example:
                code: '200'
                msg: 코스 제목이 수정되었습니다.
                data: null
  /api/v1/tour-course/{courseId}/assign:
    patch:
      tags:
      - tour-course
      summary: 코스 소유권 이전
      description: 비로그인으로 생성된 코스에 로그인 사용자 귀속
      operationId: GBC016
      x-status: 완료
      parameters:
      - name: courseId
        in: path
        required: true
        schema:
          type: string
      security:
      - bearerAuth: []
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              example:
                code: '200'
                msg: 코스 저장 완료했습니다
                data: null
  /api/v1/poi:
    get:
      tags:
      - poi
      summary: 큐레이션 POI 목록 조회
      description: '지역·인원버킷·테마 필터링된 POI 목록 반환

        (인증 선택: 비로그인 허용)'
      operationId: GBC017
      x-status: 보류
      parameters:
      - name: sigunguCode
        in: query
        required: true
        description: '시군구 코드 (예: 35130)'
        schema:
          type: string
      - name: peopleCount
        in: query
        required: true
        description: 여행 인원수 (1 / 2 / 3 이상)
        schema:
          type: integer
      - name: theme
        in: query
        required: false
        description: '테마 (콤마 구분, 예: 자연,맛집)'
        schema:
          type: string
      - name: contentTypeId
        in: query
        required: false
        description: 콘텐츠 유형 (12:관광지 / 14:문화시설 / 32:숙박 / 39:음식점)
        schema:
          type: integer
      security:
      - bearerAuth: []
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /api/v1/poi/{contentId}:
    get:
      tags:
      - poi
      summary: POI 상세 통합 조회
      description: 'contentId 기반 공통·소개·상세 정보 통합 반환

        (인증 선택: 비로그인 허용)'
      operationId: GBC018
      x-status: 보류
      parameters:
      - name: contentId
        in: path
        required: true
        schema:
          type: string
      security:
      - bearerAuth: []
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /api/v1/poi/{contentId}/like:
    post:
      tags:
      - poi
      summary: POI 좋아요 토글
      description: 로그인 사용자가 POI 좋아요 추가/취소
      operationId: GBC019
      x-status: 완료
      parameters:
      - name: contentId
        in: path
        required: true
        schema:
          type: string
      security:
      - bearerAuth: []
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ApiResponse:
      type: object
      description: 공통 응답 래퍼
      properties:
        code:
          type: string
          example: '200'
        msg:
          type: string
          example: 성공했습니다.
        data:
          nullable: true
          description: 엔드포인트별 데이터 (예시는 각 200 응답 참조)
      required:
      - code
      - msg
